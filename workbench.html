<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐰 工作台</title>
<style>
  :root {
    --cream: #FEF9F0; --cream-dark: #F5EDE0;
    --pink: #F8E5EC; --pink-dark: #F0D0DC; --pink-accent: #D4869C;
    --blue: #E6EDF6; --blue-dark: #D0DCF0; --blue-accent: #7B9BCB;
    --green: #E8F2E4; --green-accent: #6B9B5E;
    --yellow: #FFF8E1; --yellow-accent: #D4A843;
    --purple: #F0E8F5; --purple-accent: #9B7BB8;
    --text: #4A3F3A; --text-light: #7A6E66; --text-muted: #A89890;
    --white: #FFFFFF;
    --shadow: 0 2px 12px rgba(74,63,58,0.06);
    --shadow-hover: 0 4px 20px rgba(74,63,58,0.10);
    --shadow-card: 0 1px 3px rgba(74,63,58,0.08);
    --radius: 14px; --radius-sm: 10px; --radius-xs: 8px;
    --transition: 0.2s ease;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #FEF9F0 0%, #FDF3F5 30%, #F3F6FB 70%, #FEF9F0 100%);
    background-attachment: fixed; color: var(--text); min-height: 100vh;
  }

  /* ===== Header ===== */
  .header { background: var(--white); border-bottom: 1px solid rgba(212,134,156,0.15); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(74,63,58,0.04); position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 24px; line-height: 1; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .today-date { font-size: 12px; color: var(--text-light); }
  .header-btn { color: white; border: none; padding: 6px 14px; border-radius: 18px; font-size: 12px; cursor: pointer; transition: var(--transition); font-weight: 500; }
  .add-btn { background: linear-gradient(135deg, var(--pink-accent), #C47A8E); }
  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(212,134,156,0.35); }
  .btn-save { background: linear-gradient(135deg, var(--blue-accent), #6A8AB8); }
  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(123,155,203,0.35); }
  .search-wrap { position: relative; }
  .search-input { width: 140px; padding: 5px 10px 5px 28px; border: 1px solid rgba(212,134,156,0.2); border-radius: 18px; font-size: 12px; outline: none; transition: var(--transition); background: var(--cream); }
  .search-input:focus { width: 180px; border-color: var(--pink-accent); background: white; }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--text-muted); pointer-events: none; }

  /* ===== Layout ===== */
  .layout { display: grid; grid-template-columns: 280px 1fr 280px; gap: 14px; padding: 14px 16px; max-width: 1500px; margin: 0 auto; min-height: calc(100vh - 52px); }

  /* ===== Left: Tasks + Log ===== */
  .left-col { display: flex; flex-direction: column; gap: 14px; }

  /* Month Calendar View */
  .week-view { background: var(--white); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); border: 1px solid rgba(212,134,156,0.08); }
  .week-view h3 { font-size: 12px; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .month-nav { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .month-nav-btn { border: none; background: var(--cream); border-radius: 6px; padding: 3px 8px; font-size: 11px; cursor: pointer; color: var(--text-light); transition: var(--transition); }
  .month-nav-btn:hover { background: var(--cream-dark); }
  .month-label { font-size: 13px; font-weight: 600; flex: 1; text-align: center; }
  .month-today-btn { font-size: 10px; padding: 2px 7px; background: var(--pink); color: var(--pink-accent); }
  .month-weekdays { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; margin-bottom: 4px; }
  .month-weekdays span { text-align: center; font-size: 10px; color: var(--text-muted); padding: 2px 0; font-weight: 500; }
  .month-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
  .month-cell { text-align: center; padding: 5px 2px; border-radius: 6px; cursor: pointer; transition: var(--transition); border: 1px solid transparent; min-height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .month-cell:hover { background: var(--cream); border-color: var(--cream-dark); }
  .month-cell.empty { cursor: default; }
  .month-cell.empty:hover { background: transparent; border-color: transparent; }
  .month-cell.today { background: linear-gradient(135deg, var(--pink), var(--pink-dark)); border-color: var(--pink-accent); }
  .month-cell.today .mc-num { color: white; background: var(--pink-accent); }
  .month-cell .mc-num { font-size: 13px; font-weight: 600; width: 26px; height: 26px; line-height: 26px; border-radius: 50%; }
  .month-cell .mc-dots { display: flex; justify-content: center; align-items: center; gap: 2px; margin-top: 2px; height: 8px; }
  .mc-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
  .mc-dot.high { background: #E07B5A; } .mc-dot.medium { background: var(--blue-accent); } .mc-dot.low { background: #C9A87C; } .mc-dot.recurring { background: var(--green-accent); }
  .mc-dot-wrap { position: relative; display: inline-block; }
  .mc-dot-wrap:hover .mc-tooltip { display: block; }
  .mc-tooltip { display: none; position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background: var(--text); color: white; font-size: 10px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; z-index: 10; pointer-events: none; }
  .mc-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: var(--text); }

  /* Long-term */
  .sidebar-section { background: var(--white); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); border: 1px solid rgba(212,134,156,0.08); }
  .sidebar-section h3 { font-size: 11px; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .longterm-item { padding: 10px 12px; border-radius: var(--radius-sm); margin-bottom: 6px; border: 1px solid rgba(212,134,156,0.12); background: linear-gradient(135deg,#FFFAFB,#FFF5F7); transition: var(--transition); cursor: pointer; position: relative; }
  .longterm-item:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }
  .longterm-item .lt-deadline { font-size: 10px; font-weight: 700; color: #E07B5A; margin-bottom: 3px; }
  .longterm-item .lt-title { font-size: 12px; font-weight: 500; line-height: 1.4; }
  .longterm-item .lt-detail { font-size: 10px; color: var(--text-muted); line-height: 1.4; margin-top: 2px; }
  .lt-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 3px; opacity: 0; transition: var(--transition); }
  .longterm-item:hover .lt-actions { opacity: 1; }
  .lt-actions button { width: 20px; height: 20px; border: none; background: rgba(0,0,0,0.04); border-radius: 50%; cursor: pointer; font-size: 10px; color: var(--text-muted); }
  .lt-actions button:hover { background: rgba(0,0,0,0.1); color: var(--text); }
  .lt-add-btn, .rc-add-btn { width: 100%; padding: 7px; border: 1px dashed rgba(212,134,156,0.3); background: transparent; border-radius: var(--radius-sm); cursor: pointer; font-size: 11px; color: var(--text-muted); transition: var(--transition); margin-top: 2px; }
  .lt-add-btn:hover, .rc-add-btn:hover { background: var(--cream); color: var(--text); }

  /* Recurring */
  .recurring-item { padding: 8px 10px; border-radius: var(--radius-sm); margin-bottom: 4px; border: 1px solid rgba(107,155,94,0.2); background: linear-gradient(135deg,#F6FAF4,#ECF4E8); font-size: 11px; position: relative; transition: var(--transition); }
  .recurring-item.inactive { opacity: 0.5; background: linear-gradient(135deg,#FAFAFA,#F0F0F0); }
  .recurring-item .rc-title { font-weight: 500; margin-bottom: 2px; padding-right: 50px; }
  .recurring-item .rc-meta { font-size: 9px; color: var(--text-muted); }
  .rc-actions { position: absolute; top: 6px; right: 6px; display: flex; gap: 2px; opacity: 0; transition: var(--transition); }
  .recurring-item:hover .rc-actions { opacity: 1; }
  .rc-actions button { width: 18px; height: 18px; border: none; background: rgba(0,0,0,0.04); border-radius: 50%; cursor: pointer; font-size: 9px; color: var(--text-muted); }
  .rc-actions button.toggle-btn { width: auto; padding: 0 5px; border-radius: 7px; }

  /* Password */
  .pwd-items { display: flex; flex-direction: column; gap: 6px; }
  .pwd-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid rgba(123,155,203,0.15); background: linear-gradient(135deg,#FAFBFD,#F3F6FB); }
  .pwd-label { font-size: 11px; color: var(--blue-accent); font-weight: 500; }
  .pwd-value { font-size: 14px; font-weight: 700; font-family: 'SF Mono','Menlo','Consolas',monospace; color: var(--text); cursor: pointer; user-select: text; }

  /* Log */
  .log-section { background: var(--white); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); border: 1px solid rgba(212,134,156,0.08); max-height: 280px; display: flex; flex-direction: column; }
  .log-section h3 { font-size: 11px; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .log-section h3 .week-summary-btn { margin-left: auto; font-size: 10px; color: var(--blue-accent); cursor: pointer; background: none; border: none; letter-spacing: 0; }
  .log-list { display: flex; flex-direction: column; gap: 5px; overflow-y: auto; flex: 1; }
  .log-day-group { margin-bottom: 4px; }
  .log-day-label { font-size: 10px; font-weight: 600; color: var(--pink-accent); margin-bottom: 3px; }
  .log-entry { padding: 7px 10px; border-radius: 8px; font-size: 12px; line-height: 1.4; position: relative; transition: var(--transition); margin-bottom: 2px; border: 1px solid transparent; }
  .log-entry:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }
  .log-entry.manual { background: linear-gradient(135deg,#FDF3F7,#F8E5EC); border-color: rgba(212,134,156,0.15); }
  .log-entry.task-done { background: linear-gradient(135deg,#F6FAF4,#ECF4E8); border-color: rgba(107,155,94,0.15); }
  .log-entry .log-time { font-size: 9px; color: var(--text-muted); margin-top: 2px; }
  .log-delete { position: absolute; top: 5px; right: 7px; width: 18px; height: 18px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 50%; font-size: 12px; opacity: 0; transition: var(--transition); }
  .log-entry:hover .log-delete { opacity: 0.5; }
  .log-input-wrap { display: flex; gap: 4px; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(212,134,156,0.1); }
  .log-input-wrap input { flex: 1; border: 1px solid rgba(212,134,156,0.2); border-radius: 16px; padding: 6px 12px; font-size: 11px; outline: none; transition: var(--transition); background: var(--cream); }
  .log-input-wrap input:focus { border-color: var(--pink-accent); background: white; }
  .log-input-wrap button { border: none; background: linear-gradient(135deg,var(--green-accent),#5A8A4E); color: white; border-radius: 16px; padding: 6px 12px; font-size: 11px; cursor: pointer; font-weight: 500; }

  /* Upcoming */
  .upcoming-section { background: var(--white); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); border: 1px solid rgba(212,134,156,0.08); max-height: 220px; overflow-y: auto; }
  .upcoming-section h3 { font-size: 11px; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
  .upcoming-item { display: flex; align-items: center; gap: 6px; padding: 5px 0; border-bottom: 1px solid rgba(212,134,156,0.06); font-size: 11px; }
  .upcoming-item:last-child { border-bottom: none; }
  .upcoming-item.upcoming-urgent { background: linear-gradient(135deg,#FFFAFB,#FFF5F7); border-radius: 4px; padding-left: 4px; }
  .upcoming-date { font-size: 9px; color: var(--pink-accent); font-weight: 600; min-width: 38px; text-align: center; }
  .upcoming-title { flex: 1; }
  .upcoming-priority { font-size: 11px; flex-shrink: 0; }

  /* ===== Right: SOP Knowledge Base ===== */
  .right-col { display: flex; flex-direction: column; gap: 14px; }
  .center-col { display: flex; flex-direction: column; gap: 14px; }

  .sop-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .sop-header h2 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .sop-header .sop-count { font-size: 12px; color: var(--text-muted); font-weight: 400; }

  /* SOP Cards - Notion style */
  .sop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .sop-card {
    background: var(--white); border-radius: var(--radius); padding: 18px;
    box-shadow: var(--shadow-card); border: 1px solid rgba(0,0,0,0.04);
    cursor: pointer; transition: var(--transition); position: relative;
    display: flex; flex-direction: column; min-height: 130px;
  }
  .sop-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .sop-card .sop-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .sop-card .sop-icon { font-size: 28px; line-height: 1; }
  .sop-card .sop-cat-badge { font-size: 10px; padding: 3px 10px; border-radius: 10px; font-weight: 500; }
  .sop-card .sop-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; color: var(--text); }
  .sop-card .sop-preview { font-size: 12px; color: var(--text-light); line-height: 1.6; flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
  .sop-card .sop-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .sop-card .sop-tag { font-size: 10px; padding: 2px 8px; border-radius: 8px; background: var(--cream); color: var(--text-muted); }
  .sop-card .sop-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.04); }
  .sop-card .sop-contacts { font-size: 10px; color: var(--text-muted); }
  .sop-card .sop-arrow { font-size: 14px; color: var(--text-muted); transition: var(--transition); }
  .sop-card:hover .sop-arrow { transform: translateX(3px); color: var(--pink-accent); }

  /* Drag & Drop */
  .sop-card.dragging { opacity: 0.4; transform: scale(0.95); }
  .sop-card.drag-over { border: 2px dashed var(--pink-accent); background: linear-gradient(135deg,#FFFAFB,#FFF5F7); }
  .sop-card .drag-handle { position: absolute; top: 10px; right: 10px; font-size: 14px; color: var(--text-muted); cursor: grab; opacity: 0; transition: var(--transition); user-select: none; }
  .sop-card:hover .drag-handle { opacity: 0.6; }
  .sop-card .drag-handle:active { cursor: grabbing; opacity: 1; }

  /* Card color themes */
  .sop-card.theme-pink { border-left: 3px solid var(--pink-accent); }
  .sop-card.theme-blue { border-left: 3px solid var(--blue-accent); }
  .sop-card.theme-green { border-left: 3px solid var(--green-accent); }
  .sop-card.theme-yellow { border-left: 3px solid var(--yellow-accent); }
  .sop-card.theme-purple { border-left: 3px solid var(--purple-accent); }

  .sop-card.theme-pink .sop-cat-badge { background: var(--pink); color: var(--pink-accent); }
  .sop-card.theme-blue .sop-cat-badge { background: var(--blue); color: var(--blue-accent); }
  .sop-card.theme-green .sop-cat-badge { background: var(--green); color: var(--green-accent); }
  .sop-card.theme-yellow .sop-cat-badge { background: var(--yellow); color: var(--yellow-accent); }
  .sop-card.theme-purple .sop-cat-badge { background: var(--purple); color: var(--purple-accent); }

  /* SOP Detail View (when card clicked) */
  .sop-detail-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(74,63,58,0.4); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
  .sop-detail-overlay.show { display: flex; }
  .sop-detail { background: white; border-radius: var(--radius); width: 640px; max-width: 95vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(74,63,58,0.15); }
  .sop-detail-header { padding: 24px 28px 16px; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .sop-detail-header .sop-detail-cat { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .sop-detail-header h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .sop-detail-header .sop-detail-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .sop-detail-body { padding: 20px 28px; }
  .sop-detail-section { margin-bottom: 20px; }
  .sop-detail-section h4 { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
  .sop-detail-section .sop-process { font-size: 13px; line-height: 2; color: var(--text); white-space: pre-wrap; background: var(--cream); padding: 14px 18px; border-radius: var(--radius-sm); }
  .sop-detail-section .sop-notes { font-size: 13px; line-height: 1.8; color: var(--text-light); white-space: pre-wrap; background: linear-gradient(135deg,#FAFBFD,#F3F6FB); padding: 14px 18px; border-radius: var(--radius-sm); border-left: 3px solid var(--blue-accent); }
  .sop-detail-section .sop-contacts-box { font-size: 12px; line-height: 1.8; color: var(--text); background: linear-gradient(135deg,#FDF3F7,#F8E5EC); padding: 12px 16px; border-radius: var(--radius-sm); }
  .sop-detail-actions { padding: 16px 28px; border-top: 1px solid rgba(0,0,0,0.06); display: flex; justify-content: flex-end; gap: 10px; }
  .sop-detail-actions button { padding: 8px 20px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 500; transition: var(--transition); }

  /* WYSIWYG textarea styles */
  .sop-detail-title-edit { border: 2px solid transparent; font-size: 20px; font-weight: 600; padding: 6px 10px; border-radius: 8px; width: 100%; font-family: inherit; color: var(--text); background: transparent; outline: none; transition: var(--transition); margin-bottom: 4px; margin-left: -10px; }
  .sop-detail-title-edit:hover { background: var(--cream); }
  .sop-detail-title-edit:focus { background: var(--white); border-color: var(--pink-accent); box-shadow: 0 0 0 3px rgba(212,134,156,0.08); }
  .sop-process-edit, .sop-notes-edit, .sop-contacts-edit { border: 2px solid transparent; font-size: 13px; padding: 14px 18px; border-radius: var(--radius-sm); width: 100%; font-family: inherit; outline: none; transition: var(--transition); resize: vertical; min-height: 80px; line-height: 1.8; }
  .sop-process-edit { background: var(--cream); }
  .sop-notes-edit { background: linear-gradient(135deg,#FAFBFD,#F3F6FB); border-left: 3px solid var(--blue-accent); }
  .sop-contacts-edit { background: linear-gradient(135deg,#FDF3F7,#F8E5EC); min-height: 50px; }
  .sop-process-edit:hover, .sop-notes-edit:hover, .sop-contacts-edit:hover { background: var(--white); }
  .sop-process-edit:focus, .sop-notes-edit:focus, .sop-contacts-edit:focus { background: var(--white); border-color: var(--pink-accent); box-shadow: 0 0 0 3px rgba(212,134,156,0.08); }
  .inline-edit-hint { font-size: 10px; color: var(--text-muted); font-weight: 400; margin-left: 8px; opacity: 0.7; }

  /* ===== Modals ===== */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(74,63,58,0.3); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: white; border-radius: var(--radius); padding: 24px; width: 440px; max-width: 92vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(74,63,58,0.15); }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal label { display: block; font-size: 12px; color: var(--text-light); margin-bottom: 4px; margin-top: 12px; font-weight: 500; }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal select, .modal textarea { width: 100%; border: 1px solid rgba(212,134,156,0.2); border-radius: 8px; padding: 9px 12px; font-size: 13px; outline: none; font-family: inherit; transition: var(--transition); }
  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--pink-accent); box-shadow: 0 0 0 3px rgba(212,134,156,0.08); }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
  .modal-actions button { padding: 8px 20px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 500; transition: var(--transition); }
  .btn-cancel { background: var(--cream); border: 1px solid rgba(212,134,156,0.15); color: var(--text); }
  .btn-submit { background: linear-gradient(135deg, var(--pink-accent), #C47A8E); border: none; color: white; }
  .btn-submit:hover { box-shadow: 0 4px 14px rgba(212,134,156,0.35); }
  .btn-delete { background: #FFF0F0; border: 1px solid #F0D0D0; color: #C06060; }

  /* Day task popover */

    </div>

// ===== MONTH CALENDAR VIEW (Mon-Fri only) =====
function renderWeekView() {
  const grid = document.getElementById('monthGrid');
  const label = document.getElementById('monthLabel');
  const today = new Date(), todayStr = today.toISOString().split('T')[0];
  const y = calendarYear, m = calendarMonth;

  label.textContent = `${y}年 ${m + 1}月`;

  const dim = new Date(y, m + 1, 0).getDate();
  const firstDay = new Date(y, m, 1).getDay();
  // Mon-Fri grid: Mon=col1, Tue=col2, Wed=col3, Thu=col4, Fri=col5
  // firstDay: 0=Sun→skip→start at Mon(col0), 1=Mon→col0, 2=Tue→col1, ..., 5=Fri→col4, 6=Sat→skip→start at Mon(col0)
  const firstMonIdx = (firstDay === 0 || firstDay === 6) ? 0 : firstDay - 1;

  let cells = '';
  if (firstMonIdx > 0) {
    for (let i = 0; i < firstMonIdx; i++) cells += '<div class="month-cell empty"></div>';
  }

  for (let d = 1; d <= dim; d++) {
    const date = new Date(y, m, d);
    const dayOfWeek = date.getDay();
    if (dayOfWeek === 0 || dayOfWeek === 6) continue;

    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === todayStr;
    const cls = isToday ? 'today' : '';

    const dayTasks = (data.tasks || []).filter(t => t.date === ds);
    const rec = getRecurringForDate(ds);

    // Build dots with tooltip
    const dots = [
      ...dayTasks.map(t => {
        const p = t.priority === 'high' ? 'high' : t.priority === 'medium' ? 'medium' : 'low';
        return `<span class="mc-dot-wrap"><span class="mc-dot ${p}"></span><span class="mc-tooltip">${escHtml(t.title)}</span></span>`;
      }),
      ...rec.map(rt => `<span class="mc-dot-wrap"><span class="mc-dot recurring"></span><span class="mc-tooltip">🔄 ${escHtml(rt.title)}</span></span>`)
    ].slice(0, 4).join('');

    cells += `<div class="month-cell ${cls}" onclick="openDayPopover(event,'${ds}')">
      <div class="mc-num">${d}</div>
      <div class="mc-dots">${dots}</div>
    </div>`;
  }

  grid.innerHTML = cells;
}

function changeMonth(delta) {
  calendarMonth += delta;
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
  renderWeekView();
}

function goToday() {
  const today = new Date();
  calendarYear = today.getFullYear();
  calendarMonth = today.getMonth();
  renderWeekView();
}

// ===== DRAG & DROP =====
let dragSrcId = null;
function startDragFromHandle(e) {
  const card = e.target.closest('.sop-card');
  if (card) { card.draggable = true; card.classList.add('dragging'); dragSrcId = card.dataset.cardId; }
}
function onDragStart(e) {
  if (!e.target.classList.contains('sop-card')) return;
  const card = e.target;
  dragSrcId = card.dataset.cardId;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragSrcId);
}
function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.sop-card.drag-over').forEach(c => c.classList.remove('drag-over'));
  dragSrcId = null;
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const card = e.target.closest('.sop-card');
  if (card && card.dataset.cardId !== dragSrcId) {
    card.classList.add('drag-over');
  }
}
function onDragLeave(e) {
  const card = e.target.closest('.sop-card');
  if (card) card.classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  const card = e.target.closest('.sop-card');
  if (!card || !dragSrcId || card.dataset.cardId === dragSrcId) return;
  card.classList.remove('drag-over');
  // Swap positions in the array
  const cards = data.workCards || [];
  const srcIdx = cards.findIndex(c => c.id === dragSrcId);
  const dstIdx = cards.findIndex(c => c.id === card.dataset.cardId);
  if (srcIdx === -1 || dstIdx === -1) return;
  const [moved] = cards.splice(srcIdx, 1);
  cards.splice(dstIdx, 0, moved);
  renderSOP();
  saveToCloud();
  toast('已排序 ✅');
}

// Lightweight Markdown to HTML renderer
function renderMarkdown(text) {
  if (!text) return '';
  let html = escHtml(text);
  // Inline code: `code`
  html = html.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:11px;">$1</code>');
  // Bold: **text**
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic: *text*
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Links: [text](url)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--blue-accent);">$1</a>');
  // Bare URLs
  html = html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--blue-accent);">$1</a>');
  return html;
}
function renderLog() {
  const el=document.getElementById('logList'),logs=data.workLogs||[];
  if(!logs.length){el.innerHTML='<div class="empty-state">暂无记录 ✍️</div>';return}
  const sorted=[...logs].sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
  const grouped={};sorted.forEach(l=>{if(!grouped[l.date])grouped[l.date]=[];grouped[l.date].push(l)});
  const dates=Object.keys(grouped).sort().reverse().slice(0,7);
  el.innerHTML=dates.map(d=>{
    const dObj=new Date(d+'T00:00:00'),label=`${dObj.getMonth()+1}月${dObj.getDate()}日 ${FULL_WEEKDAY_NAMES[dObj.getDay()]}`;
    const isToday=d===new Date().toISOString().split('T')[0];
    return `<div class="log-day-group"><div class="log-day-label">${label}</div>${grouped[d].map(l=>`<div class="log-entry ${l.type==='task'?'task-done':'manual'}">${renderMarkdown(l.content)}<div class="log-time">${l.time||''}</div><button class="log-delete" onclick="deleteLog('${l.id}')">×</button></div>`).join('')}</div>`;
  }).join('');
}

function deleteLog(id){if(!confirm('删除这条记录？'))return;data.workLogs=(data.workLogs||[]).filter(l=>l.id!==id);renderLog();saveToCloud();toast('已删除')}
function autoLogTaskDone(title){

// ===== WEEK SUMMARY =====
function openWeekSummary() {
  const logs=data.workLogs||[];
  const now=new Date(),dayOfWeek=now.getDay(),mondayOff=dayOfWeek===0?-6:1-dayOfWeek;
  const monday=new Date(now);monday.setDate(now.getDate()+mondayOff);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
  const mds=monday.toISOString().split('T')[0],sds=sunday.toISOString().split('T')[0];
  const weekLogs=logs.filter(l=>l.date>=mds&&l.date<=sds).sort((a,b)=>a.date.localeCompare(b.date));
  const doneTasks=(data.tasks||[]).filter(t=>t.status==='done'&&t.date>=mds&&t.date<=sds);
  let summary=`📅 ${monday.getMonth()+1}月${monday.getDate()}日 — ${sunday.getMonth()+1}月${sunday.getDate()}日\n${'─'.repeat(30)}\n\n`;
  if(!weekLogs.length&&!doneTasks.length){summary+='本周暂无工作记录。\n';}
  else{
    const dayMap={};
    weekLogs.forEach(l=>{if(!dayMap[l.date])dayMap[l.date]=[];dayMap[l.date].push(l)});
    // 去重：日志里已有的完成记录不再重复
    const loggedTitles = new Set(weekLogs.map(l => l.content.replace(/^✅ 完成：/, '').trim()));
    doneTasks.forEach(t=>{if(!loggedTitles.has(t.title)){if(!dayMap[t.date])dayMap[t.date]=[];dayMap[t.date].push({content:`✅ ${t.title}`,time:'',type:'task',date:t.date})}});
    Object.keys(dayMap).sort().forEach(d=>{
      const dObj=new Date(d+'T00:00:00');
      summary+=`\n📌 ${dObj.getMonth()+1}月${dObj.getDate()}日 ${FULL_WEEKDAY_NAMES[dObj.getDay()]}\n`;
      dayMap[d].forEach(item=>{summary+=`  · ${item.content}\n`});
    });
  }
  document.getElementById('weekSummaryContent').innerHTML=renderMarkdown(summary);
  document.getElementById('weekSummaryModal').classList.add('show');
}
function closeWeekSummary(){document.getElementById('weekSummaryModal').classList.remove('show');restoreMobileTab()}

// ===== UPCOMING =====
function renderUpcoming() {
  const el=document.getElementById('upcomingList'),tasks=data.tasks||[],today=new Date().toISOString().split('T')[0];
  const up=tasks.filter(t=>t.status==='pending'&&t.date>=today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,4);
  const rUp=[];const recs=data.recurringTasks||[];
  for(let i=0;i<14;i++){const d=new Date();d.setDate(d.getDate()+i);const ds=d.toISOString().split('T')[0],wd=d.getDay();
    for(const rt of recs){if(rt.active===false||rt.weekday!==wd)continue;if(rt.weekInterval&&rt.weekInterval>1&&rt.refDate){const ref=new Date(rt.refDate+'T00:00:00'),dw=Math.floor((d.getTime()-ref.getTime())/(7*86400000));if(dw%rt.weekInterval!==0)continue}rUp.push({title:'🔄 '+rt.title,date:ds,priority:'low',isRecurring:true})}}
  // Long-term tasks
  const ltUp=(data.longtermTasks||[]).filter(lt=>lt.deadline>=today).sort((a,b)=>a.deadline.localeCompare(b.deadline)).map(lt=>({title:'📋 '+lt.title,date:lt.deadline,priority:lt.deadline<=today?'high':'medium',isLongterm:true,ltId:lt.id}));
  const all=[...up,...rUp,...ltUp].sort((a,b)=>a.date.localeCompare(b.date)).slice(0,8);
  if(!all.length){el.innerHTML='<div class="empty-state">暂无待办 🎉</div>';return}
  el.innerHTML=all.map(t=>{const dt=t.date.slice(5);const isUrgent=t.date<=today;return`<div class="upcoming-item${isUrgent?' upcoming-urgent':''}"><span class="upcoming-date">${dt}</span><span class="upcoming-title" style="cursor:${t.isLongterm?'pointer':'default'}" onclick="${t.isLongterm?`openLongtermModal('${t.ltId}')`:''}">${t.title}</span>${isUrgent?'<span class="upcoming-priority">🔴</span>':''}</div>`}).join('');
}

  if(taskId){const t=(data.tasks||[]).find(x=>x.id===taskId);if(!t)return;

function closeTaskModal(){document.getElementById('taskModal').classList.remove('show');restoreMobileTab()}
function saveTask() {
  const id=document.getElementById('taskId').value,title=document.getElementById('taskTitle').value.trim(),date=document.getElementById('taskDate').value,category=document.getElementById('taskCategory').value,priority=document.getElementById('taskPriority').value,status=document.getElementById('taskStatus').value,note=document.getElementById('taskNote').value.trim();
  if(!title||!date){toast('请填写名称和日期');return} if(!data.tasks)data.tasks=[];
  let wasPending=true;
  if(id){const t=data.tasks.find(x=>x.id===parseInt(id));if(t){wasPending=t.status==='pending';t.title=title;t.date=date;t.category=category;t.priority=priority;t.status=status;t.note=note}}
  else data.tasks.push({id:Date.now(),title,date,category,priority,status,note});
  if(id&&status==='done'&&wasPending) autoLogTaskDone(title);
  closeTaskModal();renderAll();saveToCloud();toast('已保存 ✅');
}
function deleteTask(){const id=parseInt(document.getElementById('taskId').value);if(!id||!confirm('确定删除？'))return;data.tasks=(data.tasks||[]).filter(t=>t.id!==id);closeTaskModal();renderAll();saveToCloud();toast('已删除')}

// ===== CALENDAR HELPERS =====
function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function getRecurringForDate(ds){const rts=data.recurringTasks||[];if(!rts.length)return[];const d=new Date(ds+'T00:00:00'),wd=d.getDay();return rts.filter(rt=>{if(rt.active===false||rt.weekday!==wd)return false;if(rt.weekInterval&&rt.weekInterval>1&&rt.refDate){const ref=new Date(rt.refDate+'T00:00:00'),dw=Math.floor((d.getTime()-ref.getTime())/(7*86400000));if(dw%rt.weekInterval!==0)return false}return true})}

// ===== DAY TASK POPOVER =====
function openDayPopover(event, ds) {
  event.stopPropagation();
  const pop = document.getElementById('dayTaskPopover');
  const dayTasks = (data.tasks || []).filter(t => t.date === ds);
  const rec = getRecurringForDate(ds);
  const dObj = new Date(ds + 'T00:00:00');
  const dateLabel = `${dObj.getMonth()+1}月${dObj.getDate()}日 ${FULL_WEEKDAY_NAMES[dObj.getDay()]}`;

  let html = `<div class="pop-header"><span class="pop-date">${dateLabel}</span><button class="pop-close" onclick="closeDayPopover()">×</button></div>`;

  if (!dayTasks.length && !rec.length) {
    html += '<div class="pop-empty">这天没有任务</div>';
  } else {
    // Single tasks
    dayTasks.forEach(t => {
      const doneIcon = t.status === 'done' ? '✅ ' : '';
      html += `<div class="pop-task-item" onclick="event.stopPropagation();openTaskModal(${t.id})">
        <span class="pop-title">${doneIcon}${escHtml(t.title)}</span>
        ${t.status !== 'done' ? `<button class="pop-done-btn" title="标记完成" onclick="event.stopPropagation();quickDoneTask(${t.id})">✓</button>` : ''}
        <button class="pop-del-btn" title="删除" onclick="event.stopPropagation();quickDeleteTask(${t.id})">×</button>
      </div>`;
    });
    // Recurring (read-only info)
    rec.forEach(rt => {
      html += `<div class="pop-task-item" style="cursor:default">
        <span class="pop-title">🔄 ${escHtml(rt.title)}</span>
        <span style="font-size:9px;color:var(--text-muted)">周期</span>
      </div>`;
    });
  }

  html += `<button class="pop-add-btn" onclick="event.stopPropagation();closeDayPopover();openTaskModal(null,'${ds}')">+ 添加任务</button>`;
  pop.innerHTML = html;
  pop.classList.add('show');

  // Position near click
  const rect = event.target.closest('.month-cell')?.getBoundingClientRect();
  if (rect) {
    let left = rect.left + rect.width / 2 - 110;
    let top = rect.bottom + 4;
    if (left < 10) left = 10;
    if (left + 260 > window.innerWidth) left = window.innerWidth - 270;
    if (top + 300 > window.innerHeight) top = rect.top - 300;
    pop.style.left = left + 'px';
    pop.style.top = top + 'px';
  }

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', closeDayPopoverOnOutside);
  }, 0);
}

function closeDayPopover() {
  document.getElementById('dayTaskPopover').classList.remove('show');
  document.removeEventListener('click', closeDayPopoverOnOutside);
}

function closeDayPopoverOnOutside(e) {
  const pop = document.getElementById('dayTaskPopover');
  if (!pop.classList.contains('show')) return;
  if (!pop.contains(e.target)) closeDayPopover();
}

function quickDoneTask(id) {
  const t = (data.tasks || []).find(x => x.id === id);
  if (!t) return;
  t.status = 'done';
  autoLogTaskDone(t.title);
  closeDayPopover();
  renderAll();
  saveToCloud();
  toast('已标记完成 ✅');
}

function quickDeleteTask(id) {
  if (!confirm('确定删除这个任务？')) return;
  data.tasks = (data.tasks || []).filter(t => t.id !== id);
  closeDayPopover();
  renderAll();
  saveToCloud();
  toast('已删除');
}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000)}

// ===== MOBILE =====
let currentMobileTab='tasks';
function switchMobileTab(tab){
  currentMobileTab=tab;
  document.querySelectorAll('.mobile-tab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.mobile-tab[data-tab="${tab}"]`).classList.add('active');
  const left=document.getElementById('leftCol'),center=document.getElementById('centerCol'),right=document.getElementById('rightCol');
  const all=[left,center,right];
  all.forEach(c=>{c.classList.add('mobile-hide');c.classList.remove('mobile-show')});
  if(tab==='tasks'){left.classList.remove('mobile-hide');left.classList.add('mobile-show');}
  else if(tab==='sop'){center.classList.remove('mobile-hide');center.classList.add('mobile-show');}
  else{right.classList.remove('mobile-hide');right.classList.add('mobile-show');}
  window.scrollTo({top:0,behavior:'smooth'});
}
function restoreMobileTab(){if(window.innerWidth<=768&&currentMobileTab!=='tasks')switchMobileTab(currentMobileTab)}
function initMobile(){
  if(window.innerWidth<=768){if(!window._mobileInited){window._mobileInited=true;switchMobileTab('tasks');}}
  else{document.getElementById('leftCol').classList.remove('mobile-hide','mobile-show');document.getElementById('centerCol').classList.remove('mobile-hide','mobile-show');document.getElementById('rightCol').classList.remove('mobile-hide','mobile-show');window._mobileInited=false;}
}
let resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(initMobile,200)});

// Modal close on overlay click
['taskModal','longtermModal','recurringModal','weekSummaryModal'].forEach(id=>{document.getElementById(id).addEventListener('click',function(e){if(e.target===this){if(id==='taskModal')closeTaskModal();else if(id==='longtermModal')closeLongtermModal();else if(id==='recurringModal')closeRecurringModal();else closeWeekSummary()}})});
document.getElementById('sopDetailOverlay').addEventListener('click',function(e){if(e.target===this)closeSOPDetail()});

// Close day popover on scroll
window.addEventListener('scroll', () => { const p = document.getElementById('dayTaskPopover'); if (p.classList.contains('show')) closeDayPopover(); }, true);

loadData();
