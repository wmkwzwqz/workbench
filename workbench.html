<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐰 工作台</title>
<style>
  :root {
    --cream: #FEF9F0;
    --cream-dark: #F5EDE0;
    --pink: #F8E5EC;
    --pink-dark: #F0D0DC;
    --pink-accent: #D4869C;
    --blue: #E6EDF6;
    --blue-dark: #D0DCF0;
    --blue-accent: #7B9BCB;
    --green: #E8F2E4;
    --green-accent: #6B9B5E;
    --text: #4A3F3A;
    --text-light: #7A6E66;
    --text-muted: #A89890;
    --white: #FFFFFF;
    --shadow: 0 2px 12px rgba(74, 63, 58, 0.06);
    --shadow-hover: 0 4px 20px rgba(74, 63, 58, 0.10);
    --radius: 14px;
    --radius-sm: 10px;
    --transition: 0.2s ease;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #FEF9F0 0%, #FDF3F5 30%, #F3F6FB 70%, #FEF9F0 100%);
    background-attachment: fixed; color: var(--text); min-height: 100vh;
  }

  /* ===== Header ===== */
  .header { background: var(--white); border-bottom: 1px solid rgba(212,134,156,0.15); padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(74,63,58,0.04); position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 26px; line-height: 1; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .today-date { font-size: 13px; color: var(--text-light); }
  .header-btn {
    color: white; border: none; padding: 7px 16px; border-radius: 20px; font-size: 12px;
    cursor: pointer; transition: var(--transition); font-weight: 500;
  }
  .add-btn { background: linear-gradient(135deg, var(--pink-accent), #C47A8E); }
  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(212,134,156,0.35); }
  .btn-save { background: linear-gradient(135deg, var(--blue-accent), #6A8AB8); }
  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(123,155,203,0.35); }

  /* Search */
  .search-wrap { position: relative; }
  .search-input { width: 150px; padding: 6px 12px 6px 30px; border: 1px solid rgba(212,134,156,0.2); border-radius: 20px; font-size: 12px; outline: none; transition: var(--transition); background: var(--cream); }
  .search-input:focus { width: 190px; border-color: var(--pink-accent); background: white; box-shadow: 0 0 0 3px rgba(212,134,156,0.06); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text-muted); pointer-events: none; }
  .search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text-muted); display: none; padding: 2px 4px; border-radius: 50%; }
  .search-clear.visible { display: block; }
  .search-clear:hover { background: rgba(0,0,0,0.05); }

  /* ===== Layout ===== */
  .layout { display: grid; grid-template-columns: 280px 1fr 290px; gap: 16px; padding: 16px 20px; max-width: 1560px; margin: 0 auto; min-height: calc(100vh - 56px); }

  /* ===== Left Sidebar ===== */
  .sidebar { display: flex; flex-direction: column; gap: 12px; }
  .sidebar-section { background: var(--white); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); border: 1px solid rgba(212,134,156,0.08); }
  .sidebar-section h3 { font-size: 11px; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

  /* Long-term */
  .longterm-item { padding: 10px 12px; border-radius: var(--radius-sm); margin-bottom: 6px; border: 1px solid rgba(212,134,156,0.12); background: linear-gradient(135deg,#FFFAFB,#FFF5F7); transition: var(--transition); cursor: pointer; position: relative; }
  .longterm-item:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }
  .longterm-item .lt-deadline { font-size: 10px; font-weight: 700; color: #E07B5A; margin-bottom: 3px; display: flex; align-items: center; gap: 3px; }
  .longterm-item .lt-title { font-size: 12px; font-weight: 500; line-height: 1.4; margin-bottom: 2px; padding-right: 45px; }
  .longterm-item .lt-detail { font-size: 10px; color: var(--text-muted); line-height: 1.4; padding-right: 45px; }
  .lt-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 3px; opacity: 0; transition: var(--transition); }
  .longterm-item:hover .lt-actions { opacity: 1; }
  .lt-actions button { width: 20px; height: 20px; border: none; background: rgba(0,0,0,0.04); border-radius: 50%; cursor: pointer; font-size: 10px; color: var(--text-muted); transition: var(--transition); }
  .lt-actions button:hover { background: rgba(0,0,0,0.1); color: var(--text); }
  .lt-add-btn, .rc-add-btn, .card-add-btn { width: 100%; padding: 7px; border: 1px dashed rgba(212,134,156,0.3); background: transparent; border-radius: var(--radius-sm); cursor: pointer; font-size: 11px; color: var(--text-muted); transition: var(--transition); margin-top: 2px; }
  .lt-add-btn:hover, .rc-add-btn:hover, .card-add-btn:hover { background: var(--cream); color: var(--text); }
  .deadline-urgent { color: #E07B5A !important; }
  .deadline-normal { color: var(--blue-accent) !important; }

  /* Quick Info */
  .info-item { padding: 8px 10px; border-radius: var(--radius-sm); margin-bottom: 4px; border: 1px solid rgba(123,155,203,0.15); background: linear-gradient(135deg,#FAFBFD,#F3F6FB); }
  .info-item .info-label { font-size: 10px; color: var(--blue-accent); font-weight: 600; margin-bottom: 2px; }
  .info-item .info-content { font-size: 13px; font-weight: 600; font-family: 'SF Mono','Menlo','Consolas',monospace; cursor: pointer; user-select: text; }

  /* Links */
  .link-item { display: block; padding: 7px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); margin-bottom: 2px; text-decoration: none; color: inherit; font-size: 12px; border: 1px solid transparent; }
  .link-item:hover { background: var(--cream); border-color: var(--cream-dark); }
  .link-item .link-cat { font-size: 9px; color: var(--text-muted); margin-top: 1px; }

  /* Recurring */
  .recurring-item { padding: 8px 10px; border-radius: var(--radius-sm); margin-bottom: 4px; border: 1px solid rgba(107,155,94,0.2); background: linear-gradient(135deg,#F6FAF4,#ECF4E8); font-size: 11px; position: relative; transition: var(--transition); }
  .recurring-item.inactive { opacity: 0.5; background: linear-gradient(135deg,#FAFAFA,#F0F0F0); }
  .recurring-item .rc-title { font-weight: 500; margin-bottom: 2px; padding-right: 50px; }
  .recurring-item .rc-meta { font-size: 9px; color: var(--text-muted); }
  .rc-actions { position: absolute; top: 6px; right: 6px; display: flex; gap: 2px; opacity: 0; transition: var(--transition); }
  .recurring-item:hover .rc-actions { opacity: 1; }
  .rc-actions button { width: 18px; height: 18px; border: none; background: rgba(0,0,0,0.04); border-radius: 50%; cursor: pointer; font-size: 9px; color: var(--text-muted); transition: var(--transition); }
  .rc-actions button:hover { background: rgba(0,0,0,0.1); color: var(--text); }
  .rc-actions button.toggle-btn { width: auto; padding: 0 5px; border-radius: 7px; font-size: 9px; }

  /* ===== Center Calendar ===== */
  .center-panel { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(212,134,156,0.08); display: flex; flex-direction: column; overflow: hidden; }
  .calendar-header { padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(212,134,156,0.1); }
  .calendar-nav { display: flex; align-items: center; gap: 10px; }
  .calendar-nav button { width: 28px; height: 28px; border: 1px solid rgba(212,134,156,0.2); background: var(--white); border-radius: 7px; cursor: pointer; font-size: 12px; color: var(--text); transition: var(--transition); display: flex; align-items: center; justify-content: center; }
  .calendar-nav button:hover { background: var(--pink); border-color: var(--pink-dark); }
  .calendar-month { font-size: 15px; font-weight: 600; min-width: 110px; text-align: center; }
  .calendar-stats { display: flex; gap: 12px; font-size: 11px; }
  .stat-dot { display: flex; align-items: center; gap: 3px; color: var(--text-light); }
  .stat-dot span { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .s-high { background: #E07B5A; } .s-medium { background: var(--blue-accent); } .s-low { background: #C9A87C; } .s-recurring { background: #6B9B5E; }

  .calendar-grid { display: grid; grid-template-columns: repeat(5,1fr); padding: 4px 6px; gap: 1px; flex: 1; grid-auto-rows: 1fr; }
  .calendar-day-header { text-align: center; font-size: 11px; color: var(--text-muted); padding: 6px 0; font-weight: 600; letter-spacing: 0.5px; }
  .calendar-day { padding: 5px; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); border: 2px solid transparent; display: flex; flex-direction: column; min-height: 90px; }
  .calendar-day:hover { background: var(--cream); }
  .calendar-day.today { border-color: var(--pink-accent); background: rgba(248,229,236,0.25); }
  .calendar-day.other-month { opacity: 0.25; }
  .calendar-day .day-num { font-size: 12px; font-weight: 600; text-align: center; width: 24px; height: 24px; line-height: 24px; border-radius: 50%; margin: 0 auto 3px; flex-shrink: 0; }
  .calendar-day.today .day-num { background: var(--pink-accent); color: white; }
  .calendar-day .day-tasks { display: flex; flex-direction: column; gap: 1px; overflow-y: auto; flex: 1; }
  .day-task-dot { font-size: 10px; padding: 3px 6px; border-radius: 4px; cursor: pointer; font-weight: 500; line-height: 1.3; word-break: break-all; transition: var(--transition); }
  .day-task-dot:hover { filter: brightness(0.95); }
  .task-priority-high { background: #FFE8E0; color: #E07B5A; }
  .task-priority-medium { background: var(--blue); color: var(--blue-accent); }
  .task-priority-low { background: var(--cream-dark); color: #C9A87C; }
  .task-recurring { background: #E8F2E4; color: #6B9B5E; font-style: italic; }
  .task-done { text-decoration: line-through; opacity: 0.45; }
  .day-add-hint { font-size: 9px; color: var(--text-muted); text-align: center; opacity: 0; transition: var(--transition); padding: 1px 0; }
  .calendar-day:hover .day-add-hint { opacity: 0.6; }

  /* Log indicator on calendar */
  .day-log-indicator { font-size: 9px; color: var(--green-accent); text-align: center; padding: 1px 0; font-weight: 600; }

  .calendar-footer { padding: 8px 16px; border-top: 1px solid rgba(212,134,156,0.1); font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }
  .weekend-mini { padding: 6px 14px; border-top: 1px solid rgba(212,134,156,0.08); font-size: 10px; color: var(--text-muted); display: flex; gap: 16px; align-items: center; }
  .weekend-mini .we-label { font-weight: 600; color: var(--pink-accent); }
  .weekend-mini .we-dates { display: flex; gap: 8px; flex-wrap: wrap; }
  .we-date-badge { padding: 2px 8px; border-radius: 8px; background: var(--pink); font-size: 9px; color: var(--pink-accent); cursor: pointer; transition: var(--transition); }
  .we-date-badge:hover { background: var(--pink-dark); }

  /* ===== Right Sidebar ===== */
  .right-panel { display: flex; flex-direction: column; gap: 12px; }

  /* Work Log */
  .log-section { background: var(--white); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); border: 1px solid rgba(212,134,156,0.08); max-height: 340px; display: flex; flex-direction: column; }
  .log-section h3 { font-size: 11px; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .log-section h3 .week-summary-btn { margin-left: auto; font-size: 10px; font-weight: 400; color: var(--blue-accent); cursor: pointer; background: none; border: none; letter-spacing: 0; }
  .log-section h3 .week-summary-btn:hover { text-decoration: underline; }
  .log-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
  .log-day-group { margin-bottom: 4px; }
  .log-day-label { font-size: 10px; font-weight: 600; color: var(--pink-accent); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
  .log-day-label .log-date { color: var(--text-muted); font-weight: 400; }
  .log-entry { padding: 8px 10px; border-radius: 8px; font-size: 12px; line-height: 1.4; position: relative; transition: var(--transition); margin-bottom: 3px; border: 1px solid transparent; }
  .log-entry:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }
  .log-entry.manual { background: linear-gradient(135deg,#FDF3F7,#F8E5EC); border-color: rgba(212,134,156,0.15); }
  .log-entry.task-done { background: linear-gradient(135deg,#F6FAF4,#ECF4E8); border-color: rgba(107,155,94,0.15); }
  .log-entry .log-time { font-size: 9px; color: var(--text-muted); margin-top: 2px; }
  .log-delete { position: absolute; top: 6px; right: 8px; width: 18px; height: 18px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 50%; font-size: 12px; opacity: 0; transition: var(--transition); }
  .log-entry:hover .log-delete { opacity: 0.5; }
  .log-delete:hover { opacity: 1 !important; background: rgba(0,0,0,0.05); }
  .log-input-wrap { display: flex; gap: 4px; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(212,134,156,0.1); }
  .log-input-wrap input { flex: 1; border: 1px solid rgba(212,134,156,0.2); border-radius: 18px; padding: 7px 12px; font-size: 11px; outline: none; transition: var(--transition); background: var(--cream); }
  .log-input-wrap input:focus { border-color: var(--pink-accent); background: white; }
  .log-input-wrap button { border: none; background: linear-gradient(135deg,var(--green-accent),#5A8A4E); color: white; border-radius: 18px; padding: 7px 12px; font-size: 11px; cursor: pointer; font-weight: 500; transition: var(--transition); }
  .log-input-wrap button:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(107,155,94,0.3); }

  /* Work Cards */
  .cards-section { background: var(--white); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); border: 1px solid rgba(212,134,156,0.08); max-height: 300px; display: flex; flex-direction: column; }
  .cards-section h3 { font-size: 11px; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .card-list { display: flex; flex-direction: column; gap: 5px; overflow-y: auto; flex: 1; }
  .card-item { padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); border: 1px solid transparent; }
  .card-item:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }
  .card-item.research { background: linear-gradient(135deg,#FFF5F7,#FDF0F4); border-color: rgba(212,134,156,0.15); }
  .card-item.teaching { background: linear-gradient(135deg,#F3F6FB,#E6EDF6); border-color: rgba(123,155,203,0.15); }
  .card-item.admin { background: linear-gradient(135deg,#FEFAF4,#F5EDE0); border-color: rgba(201,168,124,0.15); }
  .card-item.learning { background: linear-gradient(135deg,#F6FAF4,#ECF4E8); border-color: rgba(107,155,94,0.15); }
  .card-item .card-tags { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
  .card-tag { font-size: 9px; padding: 1px 6px; border-radius: 6px; background: rgba(0,0,0,0.06); color: var(--text-muted); }

  /* Upcoming */
  .upcoming-section { background: var(--white); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); border: 1px solid rgba(212,134,156,0.08); max-height: 240px; overflow-y: auto; }
  .upcoming-section h3 { font-size: 11px; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
  .upcoming-item { display: flex; align-items: center; gap: 6px; padding: 5px 0; border-bottom: 1px solid rgba(212,134,156,0.06); font-size: 11px; }
  .upcoming-item:last-child { border-bottom: none; }
  .upcoming-date { font-size: 9px; color: var(--pink-accent); font-weight: 600; min-width: 38px; text-align: center; }
  .upcoming-title { flex: 1; }
  .upcoming-priority { font-size: 9px; padding: 2px 6px; border-radius: 6px; font-weight: 500; }

  /* ===== Modals ===== */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(74,63,58,0.3); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: white; border-radius: var(--radius); padding: 24px; width: 460px; max-width: 92vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(74,63,58,0.15); }
  .modal.wide { width: 560px; }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal label { display: block; font-size: 12px; color: var(--text-light); margin-bottom: 4px; margin-top: 12px; font-weight: 500; }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal select, .modal textarea { width: 100%; border: 1px solid rgba(212,134,156,0.2); border-radius: 8px; padding: 9px 12px; font-size: 13px; outline: none; font-family: inherit; transition: var(--transition); }
  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--pink-accent); box-shadow: 0 0 0 3px rgba(212,134,156,0.08); }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
  .modal-actions button { padding: 8px 20px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 500; transition: var(--transition); }
  .btn-cancel { background: var(--cream); border: 1px solid rgba(212,134,156,0.15); color: var(--text); }
  .btn-submit { background: linear-gradient(135deg, var(--pink-accent), #C47A8E); border: none; color: white; }
  .btn-submit:hover { box-shadow: 0 4px 14px rgba(212,134,156,0.35); }
  .btn-delete { background: #FFF0F0; border: 1px solid #F0D0D0; color: #C06060; }

  /* Week Summary Modal */
  .week-summary-content { font-size: 13px; line-height: 1.8; white-space: pre-wrap; background: var(--cream); padding: 14px; border-radius: var(--radius-sm); max-height: 400px; overflow-y: auto; }
  .week-summary-content .ws-day { font-weight: 600; color: var(--pink-accent); margin-top: 8px; }
  .week-summary-content .ws-item { padding-left: 12px; color: var(--text); }
  .copy-btn { background: linear-gradient(135deg, var(--blue-accent), #6A8AB8); color: white; border: none; padding: 6px 14px; border-radius: 16px; font-size: 11px; cursor: pointer; transition: var(--transition); margin-bottom: 10px; }
  .copy-btn:hover { transform: translateY(-1px); }

  /* Responsive */
  @media (max-width: 1200px) { .layout { grid-template-columns: 250px 1fr 270px; gap: 10px; padding: 10px; } .search-input { width: 120px; } .search-input:focus { width: 150px; } }

  /* ===== Mobile: Bottom Tab Bar ===== */
  .mobile-tab-bar { display: none; }
  @media (max-width: 768px) {
    body { padding-bottom: 70px; }
    .header { height: 48px; padding: 0 12px; }
    .header h1 { font-size: 15px; }
    .header .search-wrap, .header .today-date, .header .btn-save { display: none; }
    .header .add-btn { padding: 5px 12px; font-size: 11px; }
    .layout { grid-template-columns: 1fr; padding: 8px; gap: 8px; }
    .sidebar, .right-panel { display: none; }
    .sidebar.mobile-show, .right-panel.mobile-show { display: flex; flex-direction: column; gap: 10px; }
    .center-panel { display: flex; }
    .center-panel.mobile-hide { display: none; }
    .calendar-day { min-height: 65px; padding: 3px; }
    .calendar-day .day-num { font-size: 11px; width: 20px; height: 20px; line-height: 20px; }
    .calendar-header { padding: 8px 10px; }
    .calendar-month { font-size: 13px; min-width: auto; }
    .calendar-stats { display: none; }
    .calendar-footer { font-size: 10px; padding: 6px 10px; }
    .day-task-dot { font-size: 9px; padding: 2px 4px; }

    /* Bottom tab bar */
    .mobile-tab-bar {
      display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
      background: var(--white); border-top: 1px solid rgba(212,134,156,0.15);
      box-shadow: 0 -2px 10px rgba(74,63,58,0.06);
      padding: 6px 0 env(safe-area-inset-bottom, 6px);
      justify-content: space-around; align-items: center;
    }
    .mobile-tab {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      border: none; background: none; cursor: pointer; padding: 4px 12px;
      font-size: 10px; color: var(--text-muted); transition: var(--transition);
    }
    .mobile-tab .tab-icon { font-size: 20px; line-height: 1; }
    .mobile-tab.active { color: var(--pink-accent); }
    .mobile-tab.active .tab-icon { transform: scale(1.1); }

    .modal { width: 95vw; padding: 16px; max-height: 80vh; }
    .toast { bottom: 80px; }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(212,134,156,0.2); border-radius: 4px; }
  .empty-state { text-align: center; color: var(--text-muted); font-size: 11px; padding: 12px; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 10px 24px; border-radius: 20px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .highlight-match { background: #FFEAA7; border-radius: 2px; }
</style>
</head>
<body>

<header class="header">

  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="搜索…" oninput="onSearch(this.value)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
    </div>
    <span class="today-date" id="todayDate"></span>
    <button class="header-btn btn-save" onclick="downloadHTML()">💾 保存</button>
    <button class="header-btn add-btn" onclick="openTaskModal()">+ 新建任务</button>
  </div>
</header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section"><h3>📋 长期工作</h3><div id="longtermList"></div><button class="lt-add-btn" onclick="openLongtermModal()">+ 添加</button></div>
    <div class="sidebar-section"><h3>🔄 周期任务</h3><div id="recurringList"></div><button class="rc-add-btn" onclick="openRecurringModal()">+ 添加</button></div>
    <div class="sidebar-section"><h3>🔐 密码 / 信息</h3><div id="quickInfoList"></div></div>
    <div class="sidebar-section"><h3>🔗 常用链接</h3><div id="linkList"></div></div>
  </aside>

  <!-- CENTER: CALENDAR -->
  <main class="center-panel">
    <div class="calendar-header">
      <div class="calendar-nav">
        <button onclick="changeMonth(-1)">◀</button><span class="calendar-month" id="calendarMonth"></span><button onclick="changeMonth(1)">▶</button>
        <button onclick="goToToday()" style="font-size:11px;width:auto;padding:0 10px;">今天</button>
      </div>
      <div class="calendar-stats">
        <span class="stat-dot"><span class="s-high"></span>紧急</span>
        <span class="stat-dot"><span class="s-medium"></span>一般</span>
        <span class="stat-dot"><span class="s-low"></span>低优</span>
        <span class="stat-dot"><span class="s-recurring"></span>周期</span>
      </div>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div class="weekend-mini" id="weekendMini"></div>
    <div class="calendar-footer">

let data = {};
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let searchKeyword = '';
let saveDebounceTimer = null;

const WEEKDAY_NAMES = ['一','二','三','四','五'];
const FULL_WEEKDAY_NAMES = ['周日','周一','周二','周三','周四','周五','周六'];
const CARD_CAT_NAMES = {research:'🔬 科研',teaching:'📖 教学',admin:'📋 行政',learning:'📚 学习',other:'📌 其他'};

function jsDayToCol(d) { return (d===0||d===6)?-1:d-1; }

function getMonthWeeks(year, month) {
  const weeks = []; const dim = new Date(year,month+1,0).getDate();
  let cw = [null,null,null,null,null];
  for(let d=1;d<=dim;d++){
    const col = jsDayToCol(new Date(year,month,d).getDay());
    if(col>=0) cw[col]=d;
    if(col===4||d===dim){ if(cw.some(x=>x!==null)) weeks.push([...cw]); cw=[null,null,null,null,null]; }
  }
  return weeks;
}

function getWeekendDates(year, month, wd) {
  const vd = wd.filter(d=>d!==null); if(!vd.length) return [];
  const fd = new Date(year,month,vd[0]); const off = fd.getDay()===0?-6:1-fd.getDay();
  const mon = new Date(year,month,vd[0]+off);
  const sat = new Date(mon); sat.setDate(mon.getDate()+5);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const r=[]; if(sat.getMonth()===month) r.push(sat.getDate()); if(sun.getMonth()===month) r.push(sun.getDate());
  return r;
}

// ===== DATA =====
function saveToLocal() { try{localStorage.setItem('workbench_data',JSON.stringify(data))}catch(e){} }
function loadFromLocal() { try{const r=localStorage.getItem('workbench_data');if(r){data=JSON.parse(r);return true}}catch(e){} return false; }

async function loadData() {
  let loaded=false;
  try{const res=await fetch(`${JSONBIN_URL}/latest`,{headers:JSONBIN_HEADERS});if(res.ok){data=(await res.json()).record;console.log('✅ JSONBin');loaded=true;saveToLocal()}}catch(e){console.warn('⚠️ JSONBin不可用')}
  if(!loaded) loaded=loadFromLocal();
  if(!loaded){console.warn('⚠️ 内置数据');data=JSON.parse(JSON.stringify(BUILTIN_DATA))}
  renderAll();
}

async function saveToCloud() {
  saveToLocal();
  if(saveDebounceTimer) clearTimeout(saveDebounceTimer);
  saveDebounceTimer=setTimeout(async()=>{try{await fetch(JSONBIN_URL,{method:'PUT',headers:JSONBIN_HEADERS,body:JSON.stringify(data)});console.log('✅ 已同步')}catch(e){console.warn('⚠️ 同步失败')}},800);
}

function renderLongterm() {
  const el=document.getElementById('longtermList'); const items=data.longtermTasks||[];
  if(!items.length){el.innerHTML='<div class="empty-state">暂无</div>';return}
  el.innerHTML=[...items].sort((a,b)=>a.deadline.localeCompare(b.deadline)).map(item=>{
    const today=new Date().toISOString().split('T')[0], isUrgent=item.deadline<=today;
    const d=new Date(item.deadline+'T00:00:00');
    return `<div class="longterm-item" onclick="openLongtermModal('${item.id}')">
      <div class="lt-deadline ${isUrgent?'deadline-urgent':'deadline-normal'}">${isUrgent?'🔴':'📅'} 截止：${d.getMonth()+1}月${d.getDate()}日</div>

      <div class="lt-actions"><button onclick="event.stopPropagation();openLongtermModal('${item.id}')" title="编辑">✎</button><button onclick="event.stopPropagation();deleteLongtermById('${item.id}')" title="删除">×</button></div>
    </div>`;
  }).join('');
}
function openLongtermModal(id) {

  }else{document.getElementById('ltModalTitle').textContent='添加长期工作';document.getElementById('ltId').value='';
    document.getElementById('ltTitle').value='';document.getElementById('ltDeadline').value='';document.getElementById('ltDetail').value='';}
}

function saveLongterm() {

  if(id){const item=data.longtermTasks.find(l=>l.id===id);if(item){item.title=title;item.deadline=deadline;item.detail=detail}}
  else data.longtermTasks.push({id:'l'+Date.now(),title,deadline,detail});

}

    </div>`;
  }).join('');
}

  else{const ni={id:'r'+Date.now(),title,weekday,category,note,active:true};if(weekInterval>1){ni.weekInterval=weekInterval;ni.refDate=refDate}data.recurringTasks.push(ni)}

function renderQuickInfo(){const el=document.getElementById('quickInfoList'),infos=data.quickInfo||[];if(!infos.length){el.innerHTML='<div class="empty-state">暂无</div>';return}el.innerHTML=infos.map(i=>`<div class="info-item"><div class="info-label">${i.category==='密码'?'🔒':'👤'} ${i.label}</div><div class="info-content">${i.content}</div></div>`).join('')}

// ===== CALENDAR =====
function getRecurringForDate(ds){const rts=data.recurringTasks||[];if(!rts.length)return[];const d=new Date(ds+'T00:00:00'),wd=d.getDay();return rts.filter(rt=>{if(rt.active===false||rt.weekday!==wd)return false;if(rt.weekInterval&&rt.weekInterval>1&&rt.refDate){const ref=new Date(rt.refDate+'T00:00:00'),dw=Math.round((d.getTime()-ref.getTime())/(7*86400000));if(dw%rt.weekInterval!==0)return false}return true})}
function matchesSearch(t,n){if(!searchKeyword)return true;return(t+' '+(n||'')).toLowerCase().includes(searchKeyword)}
function highlightText(t){if(!searchKeyword||!t)return t;const re=new RegExp(`(${searchKeyword.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');return t.replace(re,'<span class="highlight-match">$1</span>')}

function getLogsForDate(ds){return(data.workLogs||[]).filter(l=>l.date===ds)}

function renderCalendar() {
  document.getElementById('calendarMonth').textContent=`${currentYear}年 ${currentMonth+1}月`;
  const grid=document.getElementById('calendarGrid'); let html=WEEKDAY_NAMES.map(h=>`<div class="calendar-day-header">${h}</div>`).join('');
  const today=new Date(),todayStr=today.toISOString().split('T')[0],weeks=getMonthWeeks(currentYear,currentMonth);
  let allWE=[],totalM=0;
  for(const week of weeks){
    for(let col=0;col<5;col++){
      const dn=week[col];
      if(dn===null){html+='<div class="calendar-day other-month"></div>'}
      else{const ds=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`,r=renderDay(dn,ds,ds===todayStr);html+=r.html;totalM+=r.mc}
    }
    allWE.push(...getWeekendDates(currentYear,currentMonth,week));
  }
  grid.innerHTML=html;
  const weEl=document.getElementById('weekendMini');
  if(allWE.length){const uniq=[...new Set(allWE)].sort((a,b)=>a-b);
    weEl.innerHTML=`<span class="we-label">📆 周末：</span><div class="we-dates">${uniq.map(d=>{const ds=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,weT=(data.tasks||[]).filter(t=>t.date===ds);return`<span class="we-date-badge" style="${weT.length?'background:#FFE8E0;color:#E07B5A;font-weight:600;':''}" onclick="openTaskModal(null,'${ds}')">${d}日${weT.length?'📌':''}</span>`}).join('')}</div>`;
  }else weEl.innerHTML='';
  const mts=(data.tasks||[]).filter(t=>{const td=new Date(t.date);return td.getMonth()===currentMonth&&td.getFullYear()===currentYear});
  document.getElementById('taskCount').textContent=`本月 ${mts.length} 项·已完成 ${mts.filter(t=>t.status==='done').length} 项`;
  const si=document.getElementById('searchResultInfo');
  if(searchKeyword){si.style.display='inline';si.textContent=`🔍 ${totalM} 个匹配`}else si.style.display='none';
}

function renderDay(dn,ds,isToday) {
  const dts=(data.tasks||[]).filter(t=>t.date===ds),rec=getRecurringForDate(ds),logs=getLogsForDate(ds);
  let mc=0;
  const dots=[
    ...dts.map(t=>{const p=t.priority==='high'?'task-priority-high':t.priority==='medium'?'task-priority-medium':'task-priority-low',done=t.status==='done'?' task-done':'';if(matchesSearch(t.title,t.note))mc++;return{html:`<div class="day-task-dot ${p}${done}" onclick="event.stopPropagation();openTaskModal(${t.id})" title="${t.title+(t.note?'\n'+t.note:'')}">${matchesSearch(t.title,t.note)?highlightText(t.title):t.title}</div>`,matched:matchesSearch(t.title,t.note)}}),
    ...rec.map(rt=>{const m=matchesSearch(rt.title,rt.note);if(m)mc++;return{html:`<div class="day-task-dot task-recurring" title="🔄 ${rt.title} — ${rt.note||''}">${m?highlightText(rt.title):rt.title}</div>`,matched:m}})
  ];
  const visible=searchKeyword?dots.filter(d=>d.matched).map(d=>d.html):dots.map(d=>d.html);
  const logInd=logs.length?`<div class="day-log-indicator">📝 ${logs.length}条记录</div>`:'';
  let cls='calendar-day'; if(isToday) cls+=' today';
  return{html:`<div class="${cls}" onclick="openTaskModal(null,'${ds}')"><div class="day-num">${dn}</div><div class="day-tasks">${visible.join('')||'<div class="day-add-hint">+ 添加</div>'}</div>${logInd}</div>`,mc};
}

function changeMonth(d){currentMonth+=d;if(currentMonth>11){currentMonth=0;currentYear++}if(currentMonth<0){currentMonth=11;currentYear--}renderCalendar()}
function goToToday(){currentMonth=new Date().getMonth();currentYear=new Date().getFullYear();renderCalendar()}

// ===== WORK LOG =====
function renderLog() {
  const el=document.getElementById('logList'),logs=data.workLogs||[];
  if(!logs.length){el.innerHTML='<div class="empty-state">暂无记录，记下今天做了什么吧 ✍️</div>';return}
  // Group by date, show recent 7 days
  const sorted=[...logs].sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
  const grouped={};
  sorted.forEach(l=>{if(!grouped[l.date])grouped[l.date]=[];grouped[l.date].push(l)});
  const dates=Object.keys(grouped).sort().reverse().slice(0,7);
  el.innerHTML=dates.map(d=>{
    const dObj=new Date(d+'T00:00:00'),label=`${dObj.getMonth()+1}月${dObj.getDate()}日 ${FULL_WEEKDAY_NAMES[dObj.getDay()]}`;
    const isToday=d===new Date().toISOString().split('T')[0];
    return `<div class="log-day-group"><div class="log-day-label">${isToday?'🟡 今天':''} <span class="log-date">${label}</span></div>${grouped[d].map(l=>`<div class="log-entry ${l.type==='task'?'task-done':'manual'}">${l.content}<div class="log-time">${l.time||''}</div><button class="log-delete" onclick="deleteLog('${l.id}')">×</button></div>`).join('')}</div>`;
  }).join('');
}

function addLog() {
  const input=document.getElementById('logInput'),content=input.value.trim();
  if(!content)return;
  const now=new Date(),ds=now.toISOString().split('T')[0],tm=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  if(!data.workLogs)data.workLogs=[];
  data.workLogs.push({id:'log'+Date.now(),content,date:ds,time:tm,type:'manual'});
  input.value='';renderLog();renderCalendar();saveToCloud();toast('已记录 📝');
}

function deleteLog(id){if(!confirm('删除这条记录？'))return;data.workLogs=(data.workLogs||[]).filter(l=>l.id!==id);renderLog();renderCalendar();saveToCloud();toast('已删除')}

// Auto-log when task marked done
function autoLogTaskDone(taskTitle) {
  const now=new Date(),ds=now.toISOString().split('T')[0],tm=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

}

// ===== WEEK SUMMARY =====
function openWeekSummary() {
  const logs=data.workLogs||[];
  // Get this week's Monday~Sunday
  const now=new Date(),dayOfWeek=now.getDay(),mondayOff=dayOfWeek===0?-6:1-dayOfWeek;
  const monday=new Date(now);monday.setDate(now.getDate()+mondayOff);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
  const mds=monday.toISOString().split('T')[0],sds=sunday.toISOString().split('T')[0];
  const weekLogs=logs.filter(l=>l.date>=mds&&l.date<=sds).sort((a,b)=>a.date.localeCompare(b.date));

  // Also include tasks done this week
  const doneTasks=(data.tasks||[]).filter(t=>t.status==='done'&&t.date>=mds&&t.date<=sds);

  let summary=`📅 ${monday.getMonth()+1}月${monday.getDate()}日 — ${sunday.getMonth()+1}月${sunday.getDate()}日\n${'─'.repeat(30)}\n\n`;
  if(!weekLogs.length&&!doneTasks.length){summary+='本周暂无工作记录。\n';}
  else{
    // Group by day
    const dayMap={};
    weekLogs.forEach(l=>{if(!dayMap[l.date])dayMap[l.date]=[];dayMap[l.date].push(l)});
    doneTasks.forEach(t=>{if(!dayMap[t.date])dayMap[t.date]=[];dayMap[t.date].push({content:`✅ ${t.title}`,time:'',type:'task',date:t.date})});
    Object.keys(dayMap).sort().forEach(d=>{
      const dObj=new Date(d+'T00:00:00');
      summary+=`\n📌 ${dObj.getMonth()+1}月${dObj.getDate()}日 ${FULL_WEEKDAY_NAMES[dObj.getDay()]}\n`;
      dayMap[d].forEach(item=>{summary+=`  · ${item.content}\n`});
    });
  }
  document.getElementById('weekSummaryContent').textContent=summary;
  document.getElementById('weekSummaryModal').classList.add('show');
}
function closeWeekSummary(){document.getElementById('weekSummaryModal').classList.remove('show');restoreMobileTab()}
function copyWeekSummary(){const text=document.getElementById('weekSummaryContent').textContent;navigator.clipboard.writeText(text).then(()=>toast('已复制到剪贴板 📋')).catch(()=>toast('复制失败，请手动选择'))}

function closeCardModal(){document.getElementById('cardModal').classList.remove('show');restoreMobileTab()}
function saveCard() {

function deleteCard(){const id=document.getElementById('cardId').value;if(!id||!confirm('确定删除？'))return;closeCardModal();data.workCards=(data.workCards||[]).filter(c=>c.id!==id);renderCards();saveToCloud();toast('已删除')}

// ===== UPCOMING =====
function renderUpcoming() {
  const el=document.getElementById('upcomingList'),tasks=data.tasks||[],today=new Date().toISOString().split('T')[0];
  const up=tasks.filter(t=>t.status==='pending'&&t.date>=today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
  const rUp=[];const recs=data.recurringTasks||[];
  for(let i=0;i<14;i++){const d=new Date();d.setDate(d.getDate()+i);const ds=d.toISOString().split('T')[0],wd=d.getDay();
    for(const rt of recs){if(rt.active===false||rt.weekday!==wd)continue;if(rt.weekInterval&&rt.weekInterval>1&&rt.refDate){const ref=new Date(rt.refDate+'T00:00:00'),dw=Math.round((d.getTime()-ref.getTime())/(7*86400000));if(dw%rt.weekInterval!==0)continue}rUp.push({title:'🔄 '+rt.title,date:ds,priority:'low',isRecurring:true})}}
  const all=[...up,...rUp].sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);
  if(!all.length){el.innerHTML='<div class="empty-state">暂无待办 🎉</div>';return}
  el.innerHTML=all.map(t=>{const pl=t.priority==='high'?'紧急':t.priority==='medium'?'一般':'低优',pc=t.priority==='high'?'task-priority-high':t.priority==='medium'?'task-priority-medium':'task-priority-low';return`<div class="upcoming-item"><span class="upcoming-date">${t.date.slice(5)}</span><span class="upcoming-title">${t.title}</span><span class="upcoming-priority ${pc}">${pl}</span></div>`}).join('');
}

// ===== TASK MODAL (with auto-log) =====
function openTaskModal(taskId,presetDate) {
  const modal=document.getElementById('taskModal');modal.classList.add('show');document.getElementById('btnDeleteTask').style.display='none';
  if(taskId){const t=(data.tasks||[]).find(x=>x.id===taskId);if(!t)return;
    document.getElementById('modalTitle').textContent='编辑任务';document.getElementById('taskId').value=t.id;
    document.getElementById('taskTitle').value=t.title;document.getElementById('taskDate').value=t.date;
    document.getElementById('taskCategory').value=t.category;document.getElementById('taskPriority').value=t.priority;
    document.getElementById('taskStatus').value=t.status;document.getElementById('taskNote').value=t.note||'';
    document.getElementById('btnDeleteTask').style.display='inline-block';
  }else{document.getElementById('modalTitle').textContent='新建任务';document.getElementById('taskId').value='';
    document.getElementById('taskTitle').value='';document.getElementById('taskDate').value=presetDate||new Date().toISOString().split('T')[0];
    document.getElementById('taskCategory').value='行政';document.getElementById('taskPriority').value='medium';
    document.getElementById('taskStatus').value='pending';document.getElementById('taskNote').value='';}
}
function closeTaskModal(){document.getElementById('taskModal').classList.remove('show');restoreMobileTab()}
function saveTask() {
  const id=document.getElementById('taskId').value,title=document.getElementById('taskTitle').value.trim(),date=document.getElementById('taskDate').value,category=document.getElementById('taskCategory').value,priority=document.getElementById('taskPriority').value,status=document.getElementById('taskStatus').value,note=document.getElementById('taskNote').value.trim();
  if(!title||!date){toast('请填写名称和日期');return} if(!data.tasks)data.tasks=[];
  let wasPending=true;
  if(id){const t=data.tasks.find(x=>x.id===parseInt(id));if(t){wasPending=t.status==='pending';t.title=title;t.date=date;t.category=category;t.priority=priority;t.status=status;t.note=note}}
  else data.tasks.push({id:Date.now(),title,date,category,priority,status,note});
  // Auto-log if task just got marked done
  if(id&&status==='done'&&wasPending) autoLogTaskDone(title);
  closeTaskModal();renderAll();saveToCloud();toast('已保存 ✅');
}
function deleteTask(){const id=parseInt(document.getElementById('taskId').value);if(!id||!confirm('确定删除？'))return;data.tasks=(data.tasks||[]).filter(t=>t.id!==id);closeTaskModal();renderAll();saveToCloud();toast('已删除')}

function downloadHTML(){saveToCloudNow();const cd={tasks:data.tasks||[],recurringTasks:data.recurringTasks||[],longtermTasks:data.longtermTasks||[],quickInfo:data.quickInfo||[],memos:data.memos||[],links:data.links||[],workLogs:data.workLogs||[],workCards:data.workCards||[]};const h=document.documentElement.outerHTML;const si=h.indexOf('const BUILTIN_DATA = '),ei=h.indexOf(';\n\nlet data = {};',si);let nh;if(si>=0&&ei>=0){nh='<!DOCTYPE html>\n'+h.substring(h.indexOf('<html'));nh=nh.substring(0,si+'const BUILTIN_DATA = '.length)+JSON.stringify(cd,null,2)+';\n\n'+nh.substring(ei)}else nh='<!DOCTYPE html>\n'+h.substring(h.indexOf('<html'));const b=new Blob([nh],{type:'text/html'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='workbench.html';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);toast('💾 已下载！')}

// ===== TOAST =====
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000)}

// Modal close on overlay click
['taskModal','longtermModal','recurringModal','cardModal','weekSummaryModal'].forEach(id=>{document.getElementById(id).addEventListener('click',function(e){if(e.target===this){if(id==='taskModal')closeTaskModal();else if(id==='longtermModal')closeLongtermModal();else if(id==='recurringModal')closeRecurringModal();else if(id==='cardModal')closeCardModal();else closeWeekSummary()}})});

// ===== MOBILE TAB SWITCH =====
let currentMobileTab = 'calendar';
function switchMobileTab(tab) {
  currentMobileTab = tab;
  document.querySelectorAll('.mobile-tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.mobile-tab[data-tab="${tab}"]`).classList.add('active');

  const sidebar = document.querySelector('.sidebar');
  const center = document.querySelector('.center-panel');
  const right = document.querySelector('.right-panel');

  // Hide all
  sidebar.classList.remove('mobile-show');
  right.classList.remove('mobile-show');
  center.classList.remove('mobile-hide');

  if (tab === 'calendar') {
    center.classList.remove('mobile-hide');
    center.style.pointerEvents = '';
  } else if (tab === 'log') {
    center.classList.add('mobile-hide');
    center.style.pointerEvents = 'none';
    right.classList.add('mobile-show');
    setTimeout(() => { document.querySelector('.log-section')?.scrollIntoView({behavior:'smooth'}); }, 100);
  } else if (tab === 'cards') {
    center.classList.add('mobile-hide');
    center.style.pointerEvents = 'none';
    right.classList.add('mobile-show');
    setTimeout(() => { document.querySelector('.cards-section')?.scrollIntoView({behavior:'smooth'}); }, 100);
  } else if (tab === 'more') {
    center.classList.add('mobile-hide');
    center.style.pointerEvents = 'none';
    sidebar.classList.add('mobile-show');
  }
}

// Detect mobile and init
function initMobile() {
  if (window.innerWidth <= 768) {
    switchMobileTab('calendar');
  } else {
    // Reset desktop state
    document.querySelector('.sidebar').classList.remove('mobile-show');
    document.querySelector('.right-panel').classList.remove('mobile-show');
    document.querySelector('.center-panel').classList.remove('mobile-hide');
    document.querySelector('.center-panel').style.pointerEvents = '';
  }
}
// Restore mobile tab state after modal closes
function restoreMobileTab() {
  if (window.innerWidth <= 768 && currentMobileTab !== 'calendar') {
    switchMobileTab(currentMobileTab);
  }
}
window.addEventListener('resize', initMobile);

loadData();
